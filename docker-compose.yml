services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/evethon
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost
    depends_on:
      - mongodb
      - redis
    networks:
      - eve-network

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - eve-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - eve-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - eve-network

networks:
  eve-network:
    driver: bridge

volumes:
  mongodb_data:
